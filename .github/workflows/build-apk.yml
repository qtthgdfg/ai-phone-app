# .github/workflows/build-apk.yml
# Builds a signed Android APK on every push to main.
# The APK is uploaded as a downloadable artifact.
#
# SETUP (one-time):
#   1. Generate a keystore:
#        keytool -genkey -v -keystore my-release-key.keystore \
#                -alias my-key-alias -keyalg RSA -keysize 2048 -validity 10000
#   2. Base64 encode it:
#        base64 -i my-release-key.keystore | tr -d '\n'
#   3. Add these GitHub Secrets (Settings → Secrets → Actions):
#        ANDROID_KEYSTORE_BASE64   ← output of step 2
#        ANDROID_KEY_ALIAS         ← "my-key-alias"
#        ANDROID_KEY_PASSWORD      ← your key password
#        ANDROID_STORE_PASSWORD    ← your keystore password
#        EXPO_TOKEN                ← from expo.dev account (optional, for EAS)

name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:        # Allow manual trigger from GitHub UI

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"
  GRADLE_MAX_MEMORY: "4g"
  APK_RETENTION_DAYS: 30
  GRADLE_CACHE_KEY_PREFIX: gradle-v1

jobs:
  # ── Job 1: Lint and Type Check ────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache ESLint
        uses: actions/cache@v4
        with:
          path: .eslintcache
          key: eslint-${{ hashFiles('**/*.ts', '**/*.tsx', '.eslintrc*', 'eslint.config.*') }}
          restore-keys: eslint-

      - name: Run TypeScript type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Run ESLint
        run: npx eslint . --cache --cache-location .eslintcache
        continue-on-error: true

  # ── Job 2: Run Tests ─────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --watchAll=false
        continue-on-error: true

      - name: Upload test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Job 3: Build APK (main build) ────────────────────────────────────────
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [lint-and-typecheck, test]
    if: |
      always() &&
      (needs.lint-and-typecheck.result == 'success' || needs.lint-and-typecheck.result == 'skipped') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # ── Java (Android requires JDK 17) ────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      # ── Android SDK ───────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 🆕 Create build directory FIRST (before any logging) ──────────────
      - name: Create build artifacts directory
        run: mkdir -p build-artifacts

      # ── Install dependencies ──────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci 2>&1 | tee build-artifacts/npm-install.log || true

      # ── Validate keystore secret ──────────────────────────────────────────
      - name: Validate keystore secret
        id: check_keystore
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "status=available" >> $GITHUB_OUTPUT
            echo "✅ Keystore secret found"
          else
            echo "status=missing" >> $GITHUB_OUTPUT
            echo "⚠️ No keystore secret - will build unsigned APK"
          fi

      # ── Expo prebuild (generates android/ directory) ──────────────────────
      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean 2>&1 | tee build-artifacts/expo-prebuild.log
        env:
          EXPO_NO_DOTENV: 1

      # ── Restore keystore from secret ──────────────────────────────────────
      - name: Decode keystore
        if: steps.check_keystore.outputs.status == 'available'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
          if [ -f android/app/release.keystore ]; then
            echo "✅ Keystore decoded successfully ($(stat --printf="%s" android/app/release.keystore) bytes)"
          else
            echo "❌ Keystore decoding failed"
            exit 1
          fi

      # ── Configure signing ─────────────────────────────────────────────────
      - name: Configure signing
        if: steps.check_keystore.outputs.status == 'available'
        run: |
          cat >> android/gradle.properties << EOF
          MYAPP_RELEASE_STORE_FILE=release.keystore
          MYAPP_RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_STORE_PASSWORD }}
          MYAPP_RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Set up release signing in build.gradle
        if: steps.check_keystore.outputs.status == 'available'
        run: |
          cp android/app/build.gradle android/app/build.gradle.backup
          sed -i 's/signingConfigs {/signingConfigs {\n        release {\n            storeFile file(MYAPP_RELEASE_STORE_FILE)\n            storePassword MYAPP_RELEASE_STORE_PASSWORD\n            keyAlias MYAPP_RELEASE_KEY_ALIAS\n            keyPassword MYAPP_RELEASE_KEY_PASSWORD\n        }/' android/app/build.gradle
          sed -i 's/buildTypes {/buildTypes {\n        release {\n            signingConfig signingConfigs.release\n        }/' android/app/build.gradle

      # ── Make Gradle wrapper executable ────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── Cache Gradle ──────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ env.GRADLE_CACHE_KEY_PREFIX }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: ${{ env.GRADLE_CACHE_KEY_PREFIX }}-

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build release APK
        id: build_release
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace --build-cache 2>&1 | tee ../build-artifacts/gradle-build.log
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx${{ env.GRADLE_MAX_MEMORY }}"

      # ── Fallback: build debug APK if release fails ─────────────────────
      - name: Build debug APK (fallback)
        id: build_debug
        if: failure() && steps.build_release.outcome == 'failure'
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --build-cache 2>&1 | tee ../build-artifacts/gradle-debug-build.log

      # ── 🆕 Upload build logs on failure ───────────────────────────────────
      - name: Upload build logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: build-artifacts/*.log
          retention-days: 7

      # ── Find APK ──────────────────────────────────────────────────────────
      - name: Find built APK
        id: find_apk
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            APK=$(find android/app/build/outputs/apk/debug -name "*.apk" 2>/dev/null | head -1)
            echo "ℹ️ Built debug APK instead"
          fi
          if [ -z "$APK" ]; then
            echo "❌ No APK found!"
            exit 1
          fi
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "✅ Found APK: $APK"
          ls -lh "$APK"

      # ── Generate build metadata ───────────────────────────────────────────
      - name: Generate build info
        id: build_info
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          TIMESTAMP=$(date +%Y%m%d-%H%M)
          COMMIT_SHA=$(git rev-parse --short HEAD)
          BRANCH_NAME=$(echo ${{ github.ref }} | sed 's|refs/heads/||' | sed 's|refs/tags/||')
          BUILD_TYPE=$([ "${{ steps.check_keystore.outputs.status }}" = "available" ] && echo "release" || echo "debug")
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT
          
          cat > build-artifacts/build-info.json << EOF
          {
            "version": "$VERSION",
            "timestamp": "$TIMESTAMP",
            "commit": "$COMMIT_SHA",
            "branch": "$BRANCH_NAME",
            "buildType": "$BUILD_TYPE",
            "buildNumber": "${{ github.run_number }}",
            "buildId": "${{ github.run_id }}"
          }
          EOF

      # ── Rename APK with version + timestamp ───────────────────────────────
      - name: Rename APK
        run: |
          VERSION="${{ steps.build_info.outputs.version }}"
          TIMESTAMP="${{ steps.build_info.outputs.timestamp }}"
          BUILD_TYPE="${{ steps.build_info.outputs.build_type }}"
          COMMIT="${{ steps.build_info.outputs.commit }}"
          
          NEW_NAME="ai-assistant-v${VERSION}-${BUILD_TYPE}-${TIMESTAMP}-${COMMIT}.apk"
          cp "${{ steps.find_apk.outputs.apk_path }}" "build-artifacts/$NEW_NAME"
          echo "APK_NAME=$NEW_NAME" >> $GITHUB_ENV
          echo "✅ APK renamed to: $NEW_NAME"

      # ── Generate APK checksum ─────────────────────────────────────────────
      - name: Generate APK checksums
        run: |
          cd build-artifacts
          sha256sum "${{ env.APK_NAME }}" > "${{ env.APK_NAME }}.sha256"
          md5sum "${{ env.APK_NAME }}" > "${{ env.APK_NAME }}.md5"
          echo "📊 SHA256: $(cat ${{ env.APK_NAME }}.sha256)"
          echo "📊 MD5: $(cat ${{ env.APK_NAME }}.md5)"

      # ── Upload APK as artifact (downloadable from Actions tab) ────────────
      - name: Upload APK artifact
        if: steps.find_apk.outputs.apk_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: AI-Assistant-APK-${{ github.run_number }}
          path: |
            build-artifacts/${{ env.APK_NAME }}
            build-artifacts/build-info.json
            build-artifacts/${{ env.APK_NAME }}.sha256
            build-artifacts/${{ env.APK_NAME }}.md5
          retention-days: ${{ env.APK_RETENTION_DAYS }}

      # ── Create GitHub Release on tagged pushes ────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build-artifacts/${{ env.APK_NAME }}
            build-artifacts/${{ env.APK_NAME }}.sha256
            build-artifacts/${{ env.APK_NAME }}.md5
            build-artifacts/build-info.json
          body: |
            ## 🤖 AI Assistant Android Build
            
            **Version:** ${{ steps.build_info.outputs.version }}
            **Build Type:** ${{ steps.build_info.outputs.build_type }}
            **Commit:** ${{ steps.build_info.outputs.commit }}
            **Build Number:** ${{ github.run_number }}
            
            ### 📱 Installation
            1. Download the APK below
            2. Enable "Install from Unknown Sources" on your Android device
            3. Install and launch
            
            ### 🔍 Verification
            ```bash
            sha256sum ${{ env.APK_NAME }}
            ```
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Notify on failure ─────────────────────────────────────────────────
      - name: Notify on build failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issueBody = `
            ## ❌ APK Build Failed
            
            **Workflow:** ${context.workflow}
            **Run:** [${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            **Branch:** ${context.ref}
            **Commit:** ${context.sha}
            
            Please check the [workflow logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.
            `;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ APK Build Failed',
              body: issueBody,
              labels: ['build-failure', 'automated']
            });

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## ✅ Build Complete" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**APK:** \`${{ env.APK_NAME }}\`" >> $GITHUB_STEP_SUMMARY
            echo "**Version:** ${{ steps.build_info.outputs.version }}" >> $GITHUB_STEP_SUMMARY
            echo "**Build Type:** ${{ steps.build_info.outputs.build_type }}" >> $GITHUB_STEP_SUMMARY
            echo "**Size:** $(ls -lh build-artifacts/${{ env.APK_NAME }} | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📥 Download" >> $GITHUB_STEP_SUMMARY
            echo "Download from the **Artifacts** section above ⬆️" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🔍 Verification" >> $GITHUB_STEP_SUMMARY
            echo '```bash' >> $GITHUB_STEP_SUMMARY
            echo "sha256sum ${{ env.APK_NAME }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the logs above for error details." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📋 Build Logs" >> $GITHUB_STEP_SUMMARY
            echo "Download the **build-logs** artifact for detailed error information." >> $GITHUB_STEP_SUMMARY
          fi

      # ── Cleanup sensitive files ───────────────────────────────────────────
      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f android/app/release.keystore
          rm -f android/app/build.gradle.backup
          if [ -f android/gradle.properties ]; then
            sed -i '/MYAPP_RELEASE/d' android/gradle.properties
          fi
          echo "🧹 Cleaned up sensitive files"

  # ── Job 4: APK Size Analysis (runs after build) ───────────────────────────
  size-analysis:
    name: APK Size Analysis
    runs-on: ubuntu-latest
    needs: build
    if: always() && needs.build.result == 'success'
    
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: AI-Assistant-APK-${{ github.run_number }}
      
      - name: Analyze APK size
        run: |
          APK=$(find . -name "*.apk" | head -1)
          if [ -f "$APK" ]; then
            SIZE=$(stat --printf="%s" "$APK")
            SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
            echo "APK Size: ${SIZE_MB}MB"
            
            echo "## 📊 APK Size Analysis" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Size:** ${SIZE_MB}MB" >> $GITHUB_STEP_SUMMARY
            echo "- **Status:** $([ $(echo "$SIZE_MB > 100" | bc) = 1 ] && echo '⚠️ Large' || echo '✅ Normal')" >> $GITHUB_STEP_SUMMARY
          fi
